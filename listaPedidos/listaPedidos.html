<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lista de Pedidos</title>

    <link rel="stylesheet" href="listaPedidos.css">

    <!-- ICONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <header>

            <div class="voltar">
                <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
            </div>

            <h1>LISTA DE PEDIDOS</h1>

            <div class="icons">

                <a href="/dashboard/home.html">
                    <i class="fa-solid fa-house"></i>
                </a>

                <a href="/editPerfil/editPerfil.css">
                    <i class="fa-solid fa-user"></i>
                </a>

            </div>

        </header>


        <div class="conteudo">

            <div class="busca">

                <input type="text" placeholder="CLIENTE">
                <i class="fa-solid fa-magnifying-glass"></i>

            </div>


            <table>

                <thead>

                    <tr>
                        <th>ID DO PEDIDO</th>
                        <th>CLIENTE</th>
                        <th>DATA DO PEDIDO</th>
                        <th>STATUS</th>
                        <th>PRODUTOS DO PEDIDO</th>
                        <th>PREÇO TOTAL</th>
                        <th>AÇÃO</th>
                    </tr>

                </thead>


                <tbody>

                    <tr>
                        <td>001</td>
                        <td>Juana Barbosa</td>
                        <td>14/11/2025</td>
                        <td>FINALIZADO</td>
                        <td>Coxinha, coca-cola</td>
                        <td>R$ 14,00</td>
                        <td><button class="btn">Visualizar</button></td>
                    </tr>

                    <tr>
                        <td>002</td>
                        <td>Lucas Silvano</td>
                        <td>17/11/2025</td>
                        <td>EM ABERTO</td>
                        <td>Minipizza e guarana</td>
                        <td>R$ 16,00</td>
                        <td><button class="btn">Visualizar</button></td>
                    </tr>

                    <tr>
                        <td>003</td>
                        <td>Juliana Santos</td>
                        <td>20/11/2025</td>
                        <td>CANCELADO</td>
                        <td>Bolo de chocolate</td>
                        <td>R$ 14,00</td>
                        <td><button class="btn">Visualizar</button></td>
                    </tr>

                </tbody>

            </table>

            <button class="novo">Cadastrar novo pedido</button>

        </div>

    </div>

</body>

</html>

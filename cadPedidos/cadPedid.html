<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pedidos</title>

    <link rel="stylesheet" href="cadPedid.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="top-icons">
            <i onclick="history.back()" , class="fa-solid fa-arrow-left"></i>
            <a href="/dashboard/home.html"><i class="fa-solid fa-house"></i></a>
        </div>

        <div class="box">

            <h1>CADASTRO DE PEDIDOS</h1>

            <div class="form-area">

                <input class="campo" type="text" placeholder="Cliente:">
                <input class="campo" type="text" placeholder="Data do Pedido:">

                <div class="tabela-area">

                    <table>
                        <thead>
                            <tr>
                                <th class="oi">Produto:</th>
                                <th class="oi">Quantidade:</th>
                                <th class="oi">Preço Unitário:</th>
                                <th class="oi">Total:</th>
                                <th class="oi">Ação:</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td class="oi">Coxinha</td>
                                <td class="oi">27 unidades</td>
                                <td class="oi">R$ 5,00</td>
                                <td class="oi">R$ 135,00</td>
                                <td><button class="ver">Visualizar</button></td>
                            </tr>
                        </tbody>

                    </table>

                    <button class="add">ADICIONAR PRODUTO</button>

                </div>

            </div>

            <div class="botoes">
                <a href="/listaPedidos/listaPedidos.html"><button class="salvar">SALVAR PEDIDO</button></a>
                <button class="cancelar">cancelar</button>
            </div>

        </div>
    </div>

</body>

</html>

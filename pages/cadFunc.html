<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Gestão 360</title>
<link rel="stylesheet" href="../css/cadFunc.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h2>CADASTRO</h2>

        <div class="conteudo">

            <div class="formulario">

                <label for="nomeCompleto">Nome completo</label>
                <input id="nomeCompleto" type="text" name="nome" placeholder="Digite seu nome completo" required>

                <label for="emailCadastro">Email</label>
                <input id="emailCadastro" type="email" name="email" placeholder="seu@email.com" required>

                <label for="senhaCadastro">Senha</label>
                <input id="senhaCadastro" type="password" name="senha" placeholder="Senha" required>

                <label for="confirmSenhaCadastro">Confirmação da senha</label>
                <input id="confirmSenhaCadastro" type="password" name="confirmSenha" placeholder="Repita a senha" required>

            </div>

            <div class="foto">
                <div class="box-foto">
                    <img src="../Registration.png" alt="Foto de perfil" />
                </div>
            </div>

        </div>

        <a href="login.html"><button type="button">Acessar</button></a>

    </div>

</div>

</body>
</html>

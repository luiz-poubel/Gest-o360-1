<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/Sistemadeped.css">
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <i class="fas fa-arrow-left" onclick="history.back()"></i>
            <h2>SISTEMA DE PEDIDOS</h2>
            <a href="home.html"><i class="fas fa-home icon"></i></a>
        </div>

        <!-- CADASTRO -->
        <div class="box section">
            <h3>CADASTRAR PEDIDO</h3>

            <input type="text" placeholder="Nome do cliente">
            <input type="date">
            <div class="order-add-row">
                <select id="order-product">
                   <option value="">Esolha um Produto</option>
                   <option value="6">Copo (estoque: 5)</option>
                   <option value="5">Mouse (estoque: 90)</option>
                   <option value="4">Teclado (estoque: 122)</option>
                   <option value="3">Refrigerante (estoque: 80)</option>
                   <option value="2">Hamburguer (estoque: 50)</option>
                   <option value="1">Coxinha (estoque: 100)</option>
                </select>
                <input type="number" id="order-qty" min="1" value="1">
                <button class="addprod" type="button" id="btn-add-item" class="btn btn-primary">Adicionar Produto</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Preço</th>
                        <th>Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Coxinha</td>
                        <td>2</td>
                        <td>R$ 5,00</td>
                        <td>R$ 10,00</td>
                        <td><button class="excluir">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <br>
            <button class="salvar">Salvar Pedido</button>
        </div>

        <!-- LISTA -->
        <div class="box section">
            <h3>LISTA DE PEDIDOS</h3>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>João</td>
                        <td>18/03/2026</td>
                        <td>R$ 50,00</td>
                        <td>
                            <button class="excluir">Excluir</button>
                        </td>
                    </tr>

                    <tr>
                        <td>002</td>
                        <td>Maria</td>
                        <td>18/03/2026</td>
                        <td>R$ 80,00</td>
                        <td>
                            <button class="excluir">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</body>

</html>

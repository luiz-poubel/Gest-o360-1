<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produtos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/cadProd.css">
</head>
<body>

<div class="container">

  <div class="header">
    <i class="fas fa-arrow-left voltar" onclick="history.back()"></i>
    <h1>CADASTRO DE PRODUTOS</h1>
    <a href="/pages/home.html"><i class="fas fa-home home"></i></a>
  </div>
  

  <div class="box">

    <div class="form">

      <div class="left">
        <input type="text" placeholder="Nome do Produto">

        <input type="text" placeholder="Preço">

        <input type="text" placeholder="Estoque">

        <input type="text" placeholder="Categoria">
      </div>

      <div class="right">
        <textarea placeholder="Descrição do Produto"></textarea>
      </div>

    </div>

    <div class="buttons">
      <a href="/pages/listaProd.html"><button class="salvar">SALVAR PRODUTO</button></a>
      <button onclick="history.back()" class="cancelar">Cancelar</button>
    </div>

  </div>

</div>

</body>
</html>

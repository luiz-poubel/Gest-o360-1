<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pedidos</title>

    <link rel="stylesheet" href="../css/cadPedid.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="top-icons">
            <i onclick="history.back()" class="fa-solid fa-arrow-left"></i>
            <a href="home.html"><i class="fa-solid fa-house"></i></a>
        </div>

        <div class="box">

            <h1>CADASTRO DE PEDIDOS</h1>

            <div class="form-area">

                <label for="cliente">Cliente</label>
                <input id="cliente" class="campo" type="text" placeholder="Nome do cliente" required>

                <label for="dataPedido">Data do Pedido</label>
                <input id="dataPedido" class="campo" type="date" required>

                <div class="tabela-area">

                    <table>
                        <thead>
                            <tr>
                                <th class="oi">Produto</th>
                                <th class="oi">Quantidade</th>
                                <th class="oi">Preço Unitário</th>
                                <th class="oi">Total</th>
                                <th class="oi">Ação</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td class="oi">Coxinha</td>
                                <td class="oi">27 unidades</td>
                                <td class="oi">R$ 5,00</td>
                                <td class="oi">R$ 135,00</td>
                                <td><button class="ver" type="button">Visualizar</button></td>
                            </tr>
                        </tbody>

                    </table>

                    <button class="add" type="button">ADICIONAR PRODUTO</button>

                </div>

            </div>

            <div class="botoes">
                <a href="listaPedidos.html"><button class="salvar" type="button">SALVAR PEDIDO</button></a>
                <button class="cancelar" type="reset">CANCELAR</button>
            </div>

        </div>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="../css/editPerfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <i onclick="history.back()" class="fa-solid fa-arrow-left voltar"></i>

        <div class="titulo">
            EDITAR PERFIL
        </div>

        <div class="card">

            <div class="foto"></div>

            <button class="btn-foto" type="button">
                Editar foto do perfil
            </button>

            <label for="nomePerfil">Alterar Nome completo</label>
            <input id="nomePerfil" type="text" required>

            <label for="emailPerfil">Alterar Email</label>
            <input id="emailPerfil" type="email" required>

            <label for="senhaPerfil">Alterar Senha</label>
            <input id="senhaPerfil" type="password" required>

            <a href="home.html"><button class="salvar" type="button">
                    Salvar Alterações
                </button>
            </a>

        </div>

    </div>

</body>

</html>

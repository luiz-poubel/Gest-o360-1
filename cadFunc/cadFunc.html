<!DOCTYPE html>
<html lang="pt-br">
<head>

<title>Cadastro - Gestão 360</title>
<link rel="stylesheet" href="cadFunc.css">
</head>

<body>

<div class="container">

    <div class="back">
        ←
    </div>

    <div class="card">

        <h2>CADASTRO</h2>

        <form>

            <label>Nome completo</label>
            <input type="text" placeholder="Digite seu nome">
<br>

<br>
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha">
<br>
            <label>Confirmação da senha</label>
            <input type="password" placeholder="Confirme sua senha">
<br>
            <div class="btn-area">
                <a href=""><button type="submit">Acessar</button></a>
            </div>

        </form>

    </div>

</div>
